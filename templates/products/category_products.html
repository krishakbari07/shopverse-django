{% extends 'base.html' %}

{% block title %}
{{ category.name }}
{% endblock %}

{% block content %}

<h2 class="mb-4">
    {{ category.name }}
</h2>

<div class="row">

{% for product in products %}

<div class="col-md-3 mb-4">

    <div class="card h-100 shadow-sm">

        {% if product.image %}
        <img src="{{ product.image.url }}"
             class="card-img-top"
             style="height:250px;object-fit:cover;">
        {% endif %}

        <div class="card-body">

            <h5>{{ product.name }}</h5>

            <p>₹ {{ product.price }}</p>

            <a href="{% url 'product_detail' product.slug %}"
               class="btn btn-primary">
                View Product
            </a>

        </div>

    </div>

</div>

{% endfor %}

</div>

{% endblock %}
