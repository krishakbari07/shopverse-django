{% extends 'base.html' %}

{% block title %}
{{ product.name }}
{% endblock %}

{% block content %}

<div class="row">

    <div class="col-md-6">

        {% if product.image %}
        <img src="{{ product.image.url }}"
             class="img-fluid rounded"
             style="max-height: 500px; width: 100%; object-fit: contain;">
        {% endif %}

    </div>

    <div class="col-md-6">

        <h1>{{ product.name }}</h1>

        <p class="text-muted">
            Category:
            {{ product.category }}
        </p>

        <h3 class="text-success">
            ₹ {{ product.price }}
        </h3>

        <p>
            {{ product.description }}
        </p>

        <p>
            Stock:
            {{ product.stock }}
        </p>

        <a href="{% url 'add_to_cart' product.id %}" class="btn btn-success btn-lg">
            Add To Cart
        </a>

    </div>

</div>

{% endblock %}
